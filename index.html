<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM Project Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-size: 11px !important; text-transform: uppercase; font-family: sans-serif; }
        .font-negrita-dura { font-weight: 900 !important; }
        .cronograma-table { border-collapse: collapse; table-layout: fixed; min-width: 100%; }
        .cronograma-table th, .cronograma-table td { border: 1px solid #e2e8f0; text-align: center; height: 32px; width: 30px; }
        .col-nombre { width: 160px !important; text-align: left !important; padding-left: 8px !important; background: white; position: sticky; left: 0; z-index: 10; border-right: 2px solid #e2e8f0 !important; }
        .celda-activa { transition: opacity 0.3s; }
        .celda-activa-alta { background-color: #ef4444; }
        .celda-activa-media { background-color: #f59e0b; }
        .celda-activa-baja { background-color: #10b981; }
        .estado-terminado { opacity: 0.25; }
        .preview-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 2px solid #e2e8f0; }
        input, select { text-transform: none !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 text-slate-800">
    <div class="max-w-7xl mx-auto">
        <button id="btnSync" onclick="sincronizarOffline()" class="hidden w-full mb-4 bg-orange-500 text-white py-3 rounded-xl font-negrita-dura shadow-lg animate-pulse">
            🔄 HAY TAREAS PENDIENTES (SINCRONIZAR)
        </button>

        <div class="bg-slate-800 p-6 text-white rounded-t-3xl shadow-lg">
            <h1 class="font-negrita-dura tracking-widest text-center mb-4">GESTOR BIM PRO</h1>
            <div class="flex justify-center gap-6">
                <button onclick="cambiarVista('KANBAN')" id="btn-KANBAN" class="font-negrita-dura pb-1 border-b-2 border-white">TABLERO</button>
                <button onclick="cambiarVista('CRONO')" id="btn-CRONO" class="font-negrita-dura pb-1 border-b-2 border-transparent opacity-60">CRONOGRAMA</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-b-3xl shadow-xl">
            <button onclick="abrirModal()" class="mb-6 bg-blue-600 text-white px-6 py-3 rounded-xl font-negrita-dura">+ NUEVA ACTIVIDAD</button>
            
            <div id="vista-KANBAN" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div><h2 class="font-negrita-dura mb-3 text-slate-400">PENDIENTE</h2><div id="col-PENDIENTE" class="p-2 bg-slate-50 rounded-xl min-h-[400px]"></div></div>
                <div><h2 class="font-negrita-dura mb-3 text-blue-500">PROGRESO</h2><div id="col-PROGRESO" class="p-2 bg-slate-50 rounded-xl min-h-[400px]"></div></div>
                <div><h2 class="font-negrita-dura mb-3 text-green-500">TERMINADO</h2><div id="col-TERMINADO" class="p-2 bg-slate-50 rounded-xl min-h-[400px]"></div></div>
            </div>

            <div id="vista-CRONO" class="hidden overflow-x-auto" id="cronogramaContainer"></div>
        </div>
    </div>

    <div id="modalTarea" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm my-auto">
            <h2 class="font-negrita-dura mb-6 text-center">DETALLES</h2>
            <input type="hidden" id="taskId">
            <input type="text" id="taskName" maxlength="20" placeholder="NOMBRE (MÁX 20)" class="w-full p-3 border-2 rounded-xl mb-4 font-negrita-dura">
            
            <select id="taskStatus" onchange="toggleFotoSection()" class="w-full p-3 border-2 rounded-xl mb-4 font-negrita-dura">
                <option value="PENDIENTE">PENDIENTE</option>
                <option value="PROGRESO">EN PROGRESO</option>
                <option value="TERMINADO">TERMINADO</option>
            </select>

            <select id="taskPriority" class="w-full p-3 border-2 rounded-xl mb-4 font-negrita-dura">
                <option value="ALTA">ALTA</option><option value="MEDIA">MEDIA</option><option value="BAJA">BAJA</option>
            </select>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="date" id="taskStart" class="p-2 border-2 rounded-lg">
                <input type="date" id="taskEnd" class="p-2 border-2 rounded-lg">
            </div>

            <div id="fotoSection" class="hidden border-t pt-4 mb-4">
                <label class="font-negrita-dura text-slate-400">EVIDENCIA FOTOGRÁFICA:</label>
                <input type="file" id="taskFile" accept="image/*" class="w-full mt-2">
                <div id="fotoPreviewContainer"></div>
            </div>

            <div class="flex gap-2">
                <button onclick="guardar()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-negrita-dura">GUARDAR</button>
                <button onclick="cerrarModal()" class="bg-slate-100 px-4 rounded-xl font-negrita-dura">CERRAR</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9AwG77FokRKK2nVz_0j_3hizasIKLv7sELV-FZR-yk2nEbUvFrlt5vQbhsPzbnie0kA/exec";
        let tareas = [];
        let archivoBase64 = null;

        // --- LÓGICA OFFLINE ---
        function checkOffline() {
            const pendientes = JSON.parse(localStorage.getItem('pendientes') || "[]");
            document.getElementById('btnSync').classList.toggle('hidden', pendientes.length === 0);
        }

        async function sincronizarOffline() {
            const pendientes = JSON.parse(localStorage.getItem('pendientes') || "[]");
            for (let p of pendientes) {
                await fetch(SCRIPT_URL, {method: 'POST', body: JSON.stringify(p)});
            }
            localStorage.removeItem('pendientes');
            alert("SINCRO EXITOSA");
            cargar();
        }

        // --- LÓGICA FOTOS ---
        document.getElementById('taskFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = () => { archivoBase64 = reader.result; };
            reader.readAsDataURL(e.target.files[0]);
        });

        function toggleFotoSection() {
            const status = document.getElementById('taskStatus').value;
            document.getElementById('fotoSection').classList.toggle('hidden', status !== 'TERMINADO');
        }

        async function guardar() {
            const payload = {
                accion: "GUARDAR",
                id: document.getElementById('taskId').value || Date.now(),
                tarea: document.getElementById('taskName').value,
                estado: document.getElementById('taskStatus').value,
                prioridad: document.getElementById('taskPriority').value,
                inicio: document.getElementById('taskStart').value,
                fin: document.getElementById('taskEnd').value,
                archivoBase64: archivoBase64
            };

            try {
                const resp = await fetch(SCRIPT_URL, {method: 'POST', body: JSON.stringify(payload)});
                if(!resp.ok) throw new Error();
                alert("GUARDADO EN LA NUBE");
            } catch (e) {
                const pendientes = JSON.parse(localStorage.getItem('pendientes') || "[]");
                pendientes.push(payload);
                localStorage.setItem('pendientes', JSON.stringify(pendientes));
                alert("SIN CONEXIÓN: GUARDADO EN EL CELULAR");
            }
            cerrarModal(); cargar();
        }

        // --- RENDERIZADO (KANBAN Y CRONOGRAMA) ---
        // (Aquí va tu lógica de render anterior, adaptada para leer tareas[i].fotoUrl)
        
        async function cargar() {
            checkOffline();
            try {
                const resp = await fetch(SCRIPT_URL, {method: 'POST', body: JSON.stringify({accion: "LEER"})});
                const data = await resp.json();
                tareas = data.slice(1).map(r => ({id: r[0], tarea: r[1], estado: r[2], inicio: r[3], fin: r[4], prioridad: r[5], fotoUrl: r[6]}));
                render();
            } catch(e) { console.log("Modo Lectura Offline"); }
        }

        function abrirModal(id = "") {
            archivoBase64 = null;
            const t = tareas.find(x => x.id == id) || {id:"", tarea:"", estado:"PENDIENTE", prioridad:"MEDIA", inicio:"", fin:"", fotoUrl:""};
            // Llenar campos...
            document.getElementById('fotoPreviewContainer').innerHTML = t.fotoUrl ? `<img src="${t.fotoUrl}" class="preview-img">` : "";
            toggleFotoSection();
            document.getElementById('modalTarea').classList.remove('hidden');
        }
        
        function cerrarModal() { document.getElementById('modalTarea').classList.add('hidden'); }
        cargar();
    </script>
</body>
</html>
