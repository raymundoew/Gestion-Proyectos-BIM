<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM Manager Pro - Estilo Notion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #37352f; overflow-x: hidden; }
        * { font-size: 14px; }

        .font-notion-title { font-size: 32px !important; font-weight: 700; color: #37352f; letter-spacing: -0.02em; }
        .label-prop { color: rgba(55, 53, 47, 0.6); font-weight: 400; width: 120px; display: flex; align-items: center; gap: 8px; }
        
        /* Badges Notion */
        .badge { padding: 2px 8px; border-radius: 4px; font-weight: 500; font-size: 12px !important; display: inline-flex; align-items: center; }
        .bg-notion-gray { background: #f1f1f0; color: #37352f; }
        .bg-notion-blue { background: #e7f3f8; color: #096ea0; }
        .bg-notion-green { background: #eaf3db; color: #4d7c0f; }
        .bg-notion-yellow { background: #fdf3d8; color: #cb912f; }
        .bg-notion-red { background: #fdecc8; color: #c0392b; }

        /* Mobile Responsive Kanban */
        .kanban-container { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 20px; padding-left: 4px; }
        .kanban-col { min-width: 300px; flex: 1; }
        
        .tarea-card { 
            border: 1px solid #e9e9e7; border-radius: 8px; padding: 14px; margin-bottom: 12px;
            box-shadow: 0 1px 2px rgba(15, 15, 15, 0.05); cursor: pointer; background: white;
        }
        .tarea-card:hover { background: #f7f7f5; }
        .tarea-card.done { opacity: 0.6; }

        /* Cronograma Mobile Fixed */
        .crono-wrapper { overflow-x: auto; border: 1px solid #edeceb; border-radius: 12px; }
        .crono-table { border-collapse: collapse; table-layout: fixed; width: max-content; min-width: 100%; }
        .crono-table th, .crono-table td { border: 1px solid #edeceb; height: 38px; text-align: center; }
        .crono-header-month { background: #1e293b; color: white; font-weight: 600; font-size: 12px !important; }
        .crono-header-day { background: #f7f7f5; color: #91918e; font-size: 11px !important; width: 35px; }
        .crono-sidebar { width: 180px; min-width: 180px; text-align: left; padding-left: 12px; position: sticky; left: 0; background: white; z-index: 20; border-right: 2px solid #edeceb; }
        
        .bar { height: 20px; border-radius: 4px; margin: 0 2px; }
        .bar-alta { background: #fb7185; }
        .bar-media { background: #fbbf24; }
        .bar-baja { background: #34d399; }
        .bar-done { opacity: 0.25; filter: grayscale(1); }

        select, input[type="date"], input[type="text"] { border: none; background: transparent; padding: 4px 8px; border-radius: 4px; width: 100%; }
        select:hover, input:hover { background: #f1f1f0; }
        input:focus { background: #f1f1f0; outline: none; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center gap-4 mb-6">
            <span style="font-size: 40px;">📋</span>
            <h1 class="font-notion-title">Gestión de Proyectos BIM</h1>
        </div>
        
        <div class="flex gap-8 mb-8 border-b border-gray-200">
            <button onclick="cambiarVista('KANBAN')" id="btn-KANBAN" class="pb-3 border-b-2 border-black font-semibold">Tablero</button>
            <button onclick="cambiarVista('CRONO')" id="btn-CRONO" class="pb-3 border-b-2 border-transparent text-gray-400">Cronograma</button>
        </div>

        <button onclick="abrirModal()" class="mb-8 text-gray-400 hover:text-gray-900 flex items-center gap-2">
            <span class="text-xl">＋</span> Nuevo Actividad
        </button>

        <div id="vista-KANBAN" class="kanban-container">
            <div class="kanban-col">
                <div class="flex items-center gap-2 mb-4 px-2"><span class="badge bg-notion-gray">Backlog</span> <span id="count-PENDIENTE" class="text-gray-300">0</span></div>
                <div id="col-PENDIENTE"></div>
            </div>
            <div class="kanban-col">
                <div class="flex items-center gap-2 mb-4 px-2"><span class="badge bg-notion-blue">En progreso</span> <span id="count-PROGRESO" class="text-gray-300">0</span></div>
                <div id="col-PROGRESO"></div>
            </div>
            <div class="kanban-col">
                <div class="flex items-center gap-2 mb-4 px-2"><span class="badge bg-notion-green">Hecho</span> <span id="count-TERMINADO" class="text-gray-300">0</span></div>
                <div id="col-TERMINADO"></div>
            </div>
        </div>

        <div id="vista-CRONO" class="hidden crono-wrapper">
            <div id="cronogramaContainer"></div>
        </div>
    </div>

    <div id="modalTarea" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-2xl p-8 md:p-12 rounded-xl shadow-2xl relative">
            <button onclick="cerrarModal()" class="absolute top-8 right-8 text-gray-300 hover:text-black">✕</button>
            
            <input type="hidden" id="taskId">
            <input type="text" id="taskName" placeholder="Título de la actividad" class="w-full text-3xl font-bold border-none p-0 mb-10 focus:ring-0 placeholder-gray-200 !text-[32px]">
            
            <div class="space-y-4">
                <div class="flex items-center">
                    <span class="label-prop">📋 Estado</span>
                    <select id="taskStatus">
                        <option value="PENDIENTE">Backlog</option>
                        <option value="PROGRESO">En progreso</option>
                        <option value="TERMINADO">Hecho</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <span class="label-prop">⚡ Prioridad</span>
                    <select id="taskPriority">
                        <option value="ALTA">Alta</option>
                        <option value="MEDIA">Media</option>
                        <option value="BAJA">Baja</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <span class="label-prop">👤 Responsable</span>
                    <select id="taskResponsible">
                        <option value="Eduardo Raymundo">Eduardo Raymundo</option>
                        <option value="Carlos Zelaya">Carlos Zelaya</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <span class="label-prop">🗓️ Inicio</span>
                    <input type="date" id="taskStart">
                </div>
                <div class="flex items-center border-b pb-6">
                    <span class="label-prop">🏁 Fin</span>
                    <input type="date" id="taskEnd">
                </div>
            </div>

            <div class="mt-10 flex justify-between items-center">
                <button onclick="guardar()" id="btnGuardar" class="bg-[#2383e2] text-white px-6 py-2 rounded font-medium hover:bg-[#0077d4] transition-colors">Guardar</button>
                <button onclick="eliminar()" id="btnEliminar" class="text-red-400 hover:text-red-600 text-sm hidden">Eliminar actividad</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9AwG77FokRKK2nVz_0j_3hizasIKLv7sELV-FZR-yk2nEbUvFrlt5vQbhsPzbnie0kA/exec";
        let tareas = [];

        async function cargar() {
            try {
                const resp = await fetch(SCRIPT_URL, {method: 'POST', body: JSON.stringify({accion: "LEER"})});
                const data = await resp.json();
                tareas = data.slice(1).map(r => ({id:r[0], tarea:r[1], estado:r[2], inicio:r[3], fin:r[4], prioridad:r[5], responsable:r[6]}));
                render();
            } catch(e) { console.error("Error"); }
        }

        function render() {
            const counts = {PENDIENTE: 0, PROGRESO: 0, TERMINADO: 0};
            ["PENDIENTE", "PROGRESO", "TERMINADO"].forEach(est => {
                const col = document.getElementById('col-' + est);
                col.innerHTML = "";
                const filtradas = tareas.filter(t => t.estado === est);
                counts[est] = filtradas.length;
                filtradas.forEach(t => {
                    const pClass = t.prioridad === 'ALTA' ? 'bg-notion-red' : (t.prioridad === 'MEDIA' ? 'bg-notion-yellow' : 'bg-notion-green');
                    col.innerHTML += `
                        <div class="tarea-card ${t.estado === 'TERMINADO' ? 'done' : ''}" onclick="abrirModal('${t.id}')">
                            <div class="font-semibold mb-3">${t.tarea}</div>
                            <div class="flex items-center justify-between">
                                <span class="badge ${pClass}">${t.prioridad}</span>
                                <span class="text-gray-400 text-[11px] font-medium">${t.responsable || 'Sin asignar'}</span>
                            </div>
                        </div>`;
                });
            });
            document.getElementById('count-PENDIENTE').innerText = counts.PENDIENTE;
            document.getElementById('count-PROGRESO').innerText = counts.PROGRESO;
            document.getElementById('count-TERMINADO').innerText = counts.TERMINADO;
        }

        function renderCronograma() {
            const container = document.getElementById('cronogramaContainer');
            if (tareas.length === 0) return;
            
            let f = tareas.flatMap(t => [new Date(t.inicio + "T00:00:00"), new Date(t.fin + "T00:00:00")]).filter(d => !isNaN(d));
            let min = new Date(Math.min(...f)); min.setDate(min.getDate() - 1);
            let max = new Date(Math.max(...f)); max.setDate(max.getDate() + 7);
            
            let dias = []; let cur = new Date(min);
            while (cur <= max) { dias.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }

            let html = '<table class="crono-table"><thead><tr><th class="crono-sidebar"></th>';
            let meses = [], mesA = -1, span = 0;
            dias.forEach(d => { if(d.getMonth() !== mesA) { if(mesA !== -1) meses.push({n: obtenerMes(mesA), s: span}); mesA = d.getMonth(); span = 1; } else span++; });
            meses.push({n: obtenerMes(mesA), s: span});
            meses.forEach(m => html += `<th colspan="${m.s}" class="crono-header-month">${m.n}</th>`);
            
            html += '</tr><tr><th class="crono-sidebar">Actividad</th>';
            dias.forEach(d => html += `<th class="crono-header-day">${d.getDate()}</th>`);
            html += '</tr></thead><tbody>';

            tareas.forEach(t => {
                const i = new Date(t.inicio + "T00:00:00"), f = new Date(t.fin + "T00:00:00");
                const pColor = t.prioridad === 'ALTA' ? 'bar-alta' : (t.prioridad === 'MEDIA' ? 'bar-media' : 'bar-baja');
                const isDone = t.estado === 'TERMINADO' ? 'bar-done' : '';
                html += `<tr><td class="crono-sidebar font-medium ${t.estado === 'TERMINADO' ? 'text-gray-300' : ''}">${t.tarea}</td>`;
                dias.forEach(d => {
                    const active = (d >= i && d <= f) ? `<div class="bar ${pColor} ${isDone}"></div>` : '';
                    html += `<td>${active}</td>`;
                });
                html += '</tr>';
            });
            container.innerHTML = html + '</tbody></table>';
        }

        async function guardar() {
            const btn = document.getElementById('btnGuardar'); btn.innerText = "Guardando...";
            const payload = {
                accion: "GUARDAR",
                id: document.getElementById('taskId').value || Date.now().toString(),
                tarea: document.getElementById('taskName').value || "Sin título",
                estado: document.getElementById('taskStatus').value,
                prioridad: document.getElementById('taskPriority').value,
                responsable: document.getElementById('taskResponsible').value,
                inicio: document.getElementById('taskStart').value,
                fin: document.getElementById('taskEnd').value
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            cerrarModal(); cargar();
        }

        function abrirModal(id = "") {
            const t = tareas.find(x => x.id.toString() === id) || {id:"", tarea:"", estado:"PENDIENTE", prioridad:"MEDIA", responsable:"Eduardo Raymundo", inicio:"", fin:""};
            document.getElementById('taskId').value = t.id;
            document.getElementById('taskName').value = t.tarea;
            document.getElementById('taskStatus').value = t.estado;
            document.getElementById('taskPriority').value = t.prioridad;
            document.getElementById('taskResponsible').value = t.responsable;
            document.getElementById('taskStart').value = t.inicio;
            document.getElementById('taskEnd').value = t.fin;
            document.getElementById('btnEliminar').classList.toggle('hidden', !t.id);
            document.getElementById('btnGuardar').innerText = "Guardar";
            document.getElementById('modalTarea').classList.remove('hidden');
        }

        function cambiarVista(v) {
            document.getElementById('vista-KANBAN').classList.toggle('hidden', v !== 'KANBAN');
            document.getElementById('vista-CRONO').classList.toggle('hidden', v !== 'CRONO');
            document.getElementById('btn-KANBAN').className = v === 'KANBAN' ? 'pb-3 border-b-2 border-black font-semibold' : 'pb-3 border-b-2 border-transparent text-gray-400';
            document.getElementById('btn-CRONO').className = v === 'CRONO' ? 'pb-3 border-b-2 border-black font-semibold' : 'pb-3 border-b-2 border-transparent text-gray-400';
            if(v === 'CRONO') renderCronograma();
        }

        async function eliminar() {
            if(!confirm("¿Eliminar actividad?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({accion: "ELIMINAR", id: document.getElementById('taskId').value}) });
            cerrarModal(); cargar();
        }

        function obtenerMes(n) { return ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"][n]; }
        function cerrarModal() { document.getElementById('modalTarea').classList.add('hidden'); }
        cargar();
    </script>
</body>
</html>
